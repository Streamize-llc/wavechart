<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaveChart - Basic Example</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: sans-serif; }
    #chart { width: 100vw; height: 80vh; }
    .controls { padding: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .controls button {
      background: #2A2E39; color: #B2B5BE; border: 1px solid #363C4E;
      padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .controls button:hover { background: #363C4E; }
  </style>
</head>
<body>
  <div id="chart"></div>
  <div class="controls">
    <button onclick="chart.addIndicator('sma', { length: 20 })">+ SMA(20)</button>
    <button onclick="chart.addIndicator('ema', { length: 50 })">+ EMA(50)</button>
    <button onclick="chart.addIndicator('bollinger')">+ Bollinger Bands</button>
    <button onclick="chart.addSeries('volume')">+ Volume</button>
    <button onclick="chart.addIndicator('rsi')">+ RSI</button>
    <button onclick="chart.addIndicator('macd')">+ MACD</button>
    <button onclick="chart.fitContent()">Fit Content</button>
    <span style="border-left:1px solid #363C4E; margin:0 4px"></span>
    <button onclick="connectBackend()">Connect wavealgo</button>
    <button onclick="chart.addRemoteIndicator('supertrend')">+ Supertrend</button>
    <button onclick="chart.addRemoteIndicator('dmi')">+ DMI</button>
    <button onclick="chart.addRemoteIndicator('kc')">+ Keltner</button>
    <button onclick="chart.addRemoteIndicator('sar')">+ Parabolic SAR</button>
    <button onclick="chart.addRemoteIndicator('atr', {pane:'atr'})">+ ATR</button>
    <span style="border-left:1px solid #363C4E; margin:0 4px"></span>
    <button onclick="chart.setDrawingMode('trendline')">Draw Trendline</button>
    <button onclick="chart.setDrawingMode('horizontal-line')">Draw H-Line</button>
    <button onclick="chart.setDrawingMode('fibonacci')">Draw Fibonacci</button>
    <button onclick="chart.setDrawingMode(null)">Select Mode</button>
  </div>

  <script src="../dist/index.global.js"></script>
  <script>
    function generateData(count) {
      const bars = [];
      let price = 100;
      const baseTime = Math.floor(Date.now() / 1000) - count * 3600;

      for (let i = 0; i < count; i++) {
        const change = (Math.random() - 0.48) * 3;
        const open = price;
        const close = price + change;
        const high = Math.max(open, close) + Math.random() * 2;
        const low = Math.min(open, close) - Math.random() * 2;
        const volume = Math.random() * 1000000 + 500000;

        bars.push({
          time: baseTime + i * 3600,
          open: Math.round(open * 100) / 100,
          high: Math.round(high * 100) / 100,
          low: Math.round(low * 100) / 100,
          close: Math.round(close * 100) / 100,
          volume: Math.round(volume),
        });

        price = close;
      }
      return bars;
    }

    const chart = new WaveChart.Chart(document.getElementById('chart'));
    chart.setData(generateData(500));

    chart.on('crosshairMove', (data) => {
      // console.log('Crosshair:', data);
    });

    function connectBackend() {
      chart.setBackend(location.origin);
      alert('Connected to wavealgo backend');
    }
  </script>
</body>
</html>
